<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Helix :: Holographic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<canvas id="helix"></canvas>
<script>
const canvas = document.getElementById('helix');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const BASES = ['A', 'T', 'G', 'C'];
const COMPLEMENTS = { A: 'T', T: 'A', G: 'C', C: 'G' };
const CODE_SNIPPETS = [
  { kw: 'function', code: 'function init()' },
  { kw: 'return', code: 'return sequence;' },
  { kw: 'let', code: 'let helix = []' },
  { kw: 'const', code: 'const BASES = 4' },
  { kw: '', code: '  genome.decode(strand)' },
  { kw: '', code: '  ribosomes.translate()' },
  { kw: 'if', code: 'if (codon.isStart())' },
  { kw: '', code: '  protein.fold(shape)' },
  { kw: 'for', code: 'for (base in chain)' },
  { kw: '', code: '  enzyme.splice(intron)' },
  { kw: '', code: '  nucleotide.bind(pair)' },
  { kw: 'class', code: 'class Chromosome {' },
  { kw: '', code: '  polymerase.copy(dna)' },
  { kw: '', code: '  helicase.unwind()' },
  { kw: 'async', code: 'async replicate(fork)' },
  { kw: '', code: '  promoter.activate(gene)' },
  { kw: '', code: '  membrane.transport()' },
  { kw: 'yield', code: 'yield aminoAcid' },
  { kw: '', code: '  ribosome.read(mRNA)' },
  { kw: '', code: '  telomere.extend(cap)' },
  { kw: '', code: '  histone.wrap(chromatin)' },
  { kw: 'export', code: 'export { genome }' },
  { kw: '', code: '  mutation.repair(base)' },
  { kw: '', code: '  centromere.attach()' },
  { kw: 'import', code: 'import { DNA } from "bio"' },
  { kw: 'while', code: 'while (replicating)' },
  { kw: '', code: '  strand.elongate(5, 3)' },
  { kw: 'switch', code: 'switch (nucleotide)' },
  { kw: '', code: '  case "A": pair("T")' },
  { kw: '', code: '  ligase.seal(fragment)' },
  { kw: 'new', code: 'new Ribosome(mRNA)' },
  { kw: '', code: '  codon.lookup(table)' },
];

function hsl(h, s, l, a) { return `hsla(${h},${s}%,${l}%,${a})`; }
function holoHue(angle, depth, t) { return (angle * 30 + t * 40 + depth * 60) % 360; }

// Generate a random DNA strand
function makeStrand(len) {
  const s = [];
  for (let i = 0; i < len; i++) s.push(BASES[Math.floor(Math.random() * 4)]);
  return s;
}

// ── Helix definition ──
// Each helix has its own position, size, speed, strand data, scan state, and code lines
function createHelix(cfg) {
  const strand = makeStrand(600);
  return {
    cx: cfg.cx,               // center x (fraction of W)
    cy: cfg.cy || 0.5,        // center y (fraction of H)
    radius: cfg.radius,
    vSpacing: cfg.vSpacing,
    nodeCount: cfg.nodeCount,
    rotSpeed: cfg.rotSpeed,
    scale: cfg.scale || 1,    // overall visual scale (opacity, size)
    depth: cfg.depth || 0,    // layer depth 0=front
    hueOffset: cfg.hueOffset || 0,
    strand,
    time: Math.random() * 100,
    scanY: 0,
    scanSpeed: cfg.scanSpeed || 0.35,
    scanDir: 1,
    codeLines: [],
    codeTimer: 0,
    codeInterval: cfg.codeInterval || 14,
    lastCodonIdx: -1,
  };
}

// Main foreground helix - big and centered
const helices = [
  createHelix({ cx: 0.5, radius: 140, vSpacing: 14, nodeCount: 46, rotSpeed: 0.012, scale: 1, depth: 0, hueOffset: 0, scanSpeed: 0.35, codeInterval: 12 }),
  // Background helices - smaller, offset, dimmer
  createHelix({ cx: 0.12, radius: 70, vSpacing: 10, nodeCount: 52, rotSpeed: 0.009, scale: 0.45, depth: 1, hueOffset: 120, scanSpeed: 0.25, codeInterval: 18 }),
  createHelix({ cx: 0.88, radius: 65, vSpacing: 10, nodeCount: 50, rotSpeed: 0.010, scale: 0.4, depth: 1, hueOffset: 240, scanSpeed: 0.28, codeInterval: 20 }),
  createHelix({ cx: 0.28, cy: 0.48, radius: 50, vSpacing: 8, nodeCount: 55, rotSpeed: 0.007, scale: 0.25, depth: 2, hueOffset: 60, scanSpeed: 0.18, codeInterval: 22 }),
  createHelix({ cx: 0.73, cy: 0.52, radius: 55, vSpacing: 9, nodeCount: 48, rotSpeed: 0.008, scale: 0.28, depth: 2, hueOffset: 180, scanSpeed: 0.2, codeInterval: 24 }),
  createHelix({ cx: 0.05, cy: 0.4, radius: 35, vSpacing: 7, nodeCount: 58, rotSpeed: 0.006, scale: 0.15, depth: 3, hueOffset: 300, scanSpeed: 0.14, codeInterval: 28 }),
  createHelix({ cx: 0.95, cy: 0.6, radius: 38, vSpacing: 7, nodeCount: 56, rotSpeed: 0.0065, scale: 0.17, depth: 3, hueOffset: 30, scanSpeed: 0.15, codeInterval: 26 }),
];

// Particles
const particles = [];
for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * 3000, y: Math.random() * 2000,
    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
    size: Math.random() * 1.8 + 0.3, alpha: Math.random() * 0.2,
  });
}

const light = { x: 0, y: 0 };
let globalTime = 0;

function getCodeLine(hlx, baseIndex) {
  const ci = Math.floor(baseIndex / 3) * 3;
  const codon = hlx.strand[ci % 600] + hlx.strand[(ci + 1) % 600] + hlx.strand[(ci + 2) % 600];
  const comp = codon.split('').map(b => COMPLEMENTS[b]).join('');
  const snippet = CODE_SNIPPETS[ci % CODE_SNIPPETS.length];
  return { codon, comp, snippet, age: 0 };
}

// ── Draw a single helix ──
function drawHelix(hlx) {
  const s = hlx.scale;
  const alphaBase = Math.max(0.15, s);
  const centerX = W * hlx.cx;
  const centerY = H * hlx.cy;
  const startY = centerY - (hlx.nodeCount / 2) * hlx.vSpacing;
  const endY = startY + hlx.nodeCount * hlx.vSpacing;
  let scanBaseIndex = 0;

  // Collect drawables
  const drawables = [];
  for (let i = 0; i < hlx.nodeCount; i++) {
    const angle = hlx.time + i * 0.3;
    const y = startY + i * hlx.vSpacing;
    const x1 = centerX + Math.cos(angle) * hlx.radius;
    const z1 = Math.sin(angle);
    const x2 = centerX + Math.cos(angle + Math.PI) * hlx.radius;
    const z2 = Math.sin(angle + Math.PI);
    const base1 = hlx.strand[i % 600];
    const base2 = COMPLEMENTS[base1];
    const isAtScan = Math.abs(y - hlx.scanY) < 8;
    if (isAtScan) scanBaseIndex = i;

    drawables.push({ type: 'bond', x1, x2, y, z: (z1 + z2) / 2, angle, isAtScan, base1, base2 });
    drawables.push({ type: 'node', x: x1, y, z: z1, base: base1, angle, isAtScan });
    drawables.push({ type: 'node', x: x2, y, z: z2, base: base2, angle: angle + Math.PI, isAtScan });
  }
  drawables.sort((a, b) => a.z - b.z);

  for (const d of drawables) {
    if (d.type === 'bond') {
      const depthScale = (d.z + 1) / 2;
      const alpha = (0.04 + depthScale * 0.12) * alphaBase;
      const bondHue = (holoHue(d.angle, d.z, hlx.time) + hlx.hueOffset) % 360;

      ctx.beginPath();
      ctx.setLineDash([3, 4]);
      ctx.moveTo(d.x1, d.y);
      ctx.lineTo(d.x2, d.y);

      if (d.isAtScan) {
        ctx.strokeStyle = hsl(bondHue, 100, 70, Math.min(1, alpha * 4));
        ctx.lineWidth = 1.5 * s + 0.5;
        ctx.shadowColor = hsl(bondHue, 100, 60, 0.4 * alphaBase);
        ctx.shadowBlur = 8 * s;
      } else {
        ctx.strokeStyle = hsl(bondHue, 60, 50, alpha);
        ctx.lineWidth = Math.max(0.5, s);
        ctx.shadowBlur = 0;
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // Labels on front-facing bonds (only if large enough to read)
      if (depthScale > 0.4 && s > 0.3) {
        const mx = (d.x1 + d.x2) / 2;
        const fontSize = Math.max(7, (8 + depthScale * 3) * s);
        ctx.font = `${fontSize}px Courier New`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const la = d.isAtScan ? 0.9 * alphaBase : (0.1 + depthScale * 0.18) * alphaBase;
        ctx.fillStyle = d.isAtScan
          ? hsl(bondHue, 100, 80, la)
          : hsl(bondHue, 50, 60, la);
        ctx.fillText(`${d.base1}\u2013${d.base2}`, mx, d.y);
        ctx.textAlign = 'left';
      }
    } else {
      // Node
      const depthScale = (d.z + 1) / 2;
      const size = (3 + depthScale * 4) * s + 0.5;
      const hue = (holoHue(d.angle, d.z, hlx.time) + hlx.hueOffset) % 360;

      const dx = d.x - light.x;
      const dy = d.y - light.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const li = Math.max(0, 1 - dist / 600) * depthScale;
      const spec = Math.pow(li, 3);
      const bl = 45 + spec * 40;
      const bs = 80 + spec * 20;

      // Glow
      if (depthScale > 0.35 && s > 0.2) {
        const gs = size * (d.isAtScan ? 5 : 3);
        const glow = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, gs);
        glow.addColorStop(0, hsl(hue, 100, 70, (d.isAtScan ? 0.2 : 0.08 * depthScale) * alphaBase));
        glow.addColorStop(0.5, hsl((hue + 40) % 360, 100, 50, (d.isAtScan ? 0.08 : 0.03 * depthScale) * alphaBase));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(d.x - gs, d.y - gs, gs * 2, gs * 2);
      }

      // Core node
      ctx.beginPath();
      ctx.arc(d.x, d.y, size, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(d.x - size * 0.3, d.y - size * 0.3, 0, d.x, d.y, size);
      grad.addColorStop(0, hsl(hue, bs, Math.min(95, bl + 30), 0.9 * depthScale * alphaBase));
      grad.addColorStop(0.5, hsl((hue + 20) % 360, bs, bl, 0.7 * depthScale * alphaBase));
      grad.addColorStop(1, hsl((hue + 50) % 360, 60, bl * 0.4, 0.5 * depthScale * alphaBase));
      ctx.fillStyle = grad;
      ctx.fill();

      // Specular
      if (spec > 0.08 && s > 0.25) {
        ctx.beginPath();
        ctx.arc(d.x - size * 0.2, d.y - size * 0.25, size * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = hsl((hue + 180) % 360, 100, 90, spec * 0.7 * alphaBase);
        ctx.fill();
      }

      // Scan flash
      if (d.isAtScan) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, size * 3, 0, Math.PI * 2);
        const flash = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, size * 3);
        flash.addColorStop(0, hsl(hue, 100, 80, 0.35 * alphaBase));
        flash.addColorStop(0.5, hsl((hue + 60) % 360, 100, 60, 0.12 * alphaBase));
        flash.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = flash;
        ctx.fill();
      }
    }
  }

  // Backbone curves
  for (let strand = 0; strand < 2; strand++) {
    ctx.beginPath();
    for (let i = 0; i < hlx.nodeCount; i++) {
      const angle = hlx.time + i * 0.3 + strand * Math.PI;
      const x = centerX + Math.cos(angle) * hlx.radius;
      const y = startY + i * hlx.vSpacing;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    const bHue = (hlx.time * 30 + strand * 180 + hlx.hueOffset) % 360;
    ctx.strokeStyle = hsl(bHue, 70, 50, 0.05 * alphaBase);
    ctx.lineWidth = Math.max(0.5, 2 * s);
    ctx.stroke();
  }

  // Scan line
  hlx.scanY += hlx.scanSpeed * hlx.scanDir;
  if (hlx.scanY > endY + 15) hlx.scanDir = -1;
  else if (hlx.scanY < startY - 15) hlx.scanDir = 1;

  const sHue = (hlx.time * 60 + hlx.hueOffset) % 360;
  const scanGrad = ctx.createLinearGradient(centerX - hlx.radius - 40, 0, centerX + hlx.radius + 40, 0);
  scanGrad.addColorStop(0, 'rgba(0,0,0,0)');
  scanGrad.addColorStop(0.15, hsl(sHue, 100, 65, 0.4 * alphaBase));
  scanGrad.addColorStop(0.5, hsl((sHue + 40) % 360, 100, 80, 0.7 * alphaBase));
  scanGrad.addColorStop(0.85, hsl((sHue + 80) % 360, 100, 65, 0.4 * alphaBase));
  scanGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(centerX - hlx.radius - 40, hlx.scanY - 1, hlx.radius * 2 + 80, 2);

  // Scan glow
  const scanGlow = ctx.createLinearGradient(0, hlx.scanY - 15, 0, hlx.scanY + 15);
  scanGlow.addColorStop(0, 'rgba(0,0,0,0)');
  scanGlow.addColorStop(0.5, hsl(sHue, 100, 60, 0.04 * alphaBase));
  scanGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = scanGlow;
  ctx.fillRect(centerX - hlx.radius - 40, hlx.scanY - 15, hlx.radius * 2 + 80, 30);

  // Cycle code lines
  hlx.codeTimer++;
  if (hlx.codeTimer >= hlx.codeInterval) {
    hlx.codeTimer = 0;
    const line = getCodeLine(hlx, scanBaseIndex + Math.floor(Math.random() * 12));
    hlx.codeLines.push(line);
    if (hlx.codeLines.length > 12) hlx.codeLines = hlx.codeLines.slice(-9);
  }
  for (const l of hlx.codeLines) l.age++;

  // Floating code window
  drawCodeWindow(hlx, centerX, hlx.scanY);

  hlx.time += hlx.rotSpeed;
}

function drawCodeWindow(hlx, anchorX, anchorY) {
  const s = hlx.scale;
  const alphaBase = Math.max(0.15, s);
  const lines = hlx.codeLines.slice(-7);
  if (lines.length === 0) return;

  const lineH = Math.max(12, 18 * s);
  const padX = Math.max(8, 14 * s);
  const padY = Math.max(6, 10 * s);
  const fontSize = Math.max(8, 11 * s);
  const boxW = Math.max(160, 310 * s);
  const boxH = padY * 2 + 7 * lineH + 4;

  // Position to the right (or left) of the helix
  let wx = anchorX + hlx.radius + Math.max(20, 40 * s);
  let wy = anchorY - boxH / 2;

  if (wx + boxW > W - 5) wx = anchorX - hlx.radius - boxW - Math.max(20, 40 * s);
  if (wy < 5) wy = 5;
  if (wy + boxH > H - 5) wy = H - boxH - 5;

  const borderHue = (hlx.time * 50 + hlx.hueOffset) % 360;

  // Outer glow
  const glowGrad = ctx.createRadialGradient(wx + boxW / 2, wy + boxH / 2, boxH * 0.2, wx + boxW / 2, wy + boxH / 2, boxH * 0.8);
  glowGrad.addColorStop(0, hsl(borderHue, 80, 50, 0.035 * alphaBase));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(wx - 30, wy - 30, boxW + 60, boxH + 60);

  // Panel body
  ctx.save();
  ctx.globalAlpha = 0.8 * alphaBase;
  const panelGrad = ctx.createLinearGradient(wx, wy, wx + boxW, wy + boxH);
  panelGrad.addColorStop(0, 'rgba(0, 10, 20, 0.8)');
  panelGrad.addColorStop(0.5, 'rgba(0, 15, 30, 0.72)');
  panelGrad.addColorStop(1, 'rgba(5, 10, 25, 0.8)');
  ctx.fillStyle = panelGrad;

  // Rounded rect
  const r = Math.max(3, 6 * s);
  ctx.beginPath();
  ctx.moveTo(wx + r, wy);
  ctx.lineTo(wx + boxW - r, wy);
  ctx.quadraticCurveTo(wx + boxW, wy, wx + boxW, wy + r);
  ctx.lineTo(wx + boxW, wy + boxH - r);
  ctx.quadraticCurveTo(wx + boxW, wy + boxH, wx + boxW - r, wy + boxH);
  ctx.lineTo(wx + r, wy + boxH);
  ctx.quadraticCurveTo(wx, wy + boxH, wx, wy + boxH - r);
  ctx.lineTo(wx, wy + r);
  ctx.quadraticCurveTo(wx, wy, wx + r, wy);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Holographic border
  ctx.strokeStyle = hsl(borderHue, 80, 55, 0.45 * alphaBase);
  ctx.lineWidth = Math.max(0.5, s);
  ctx.stroke();

  // Inner border
  if (s > 0.3) {
    ctx.beginPath();
    const m = 2;
    ctx.moveTo(wx + r + m, wy + m);
    ctx.lineTo(wx + boxW - r - m, wy + m);
    ctx.quadraticCurveTo(wx + boxW - m, wy + m, wx + boxW - m, wy + r + m);
    ctx.lineTo(wx + boxW - m, wy + boxH - r - m);
    ctx.quadraticCurveTo(wx + boxW - m, wy + boxH - m, wx + boxW - r - m, wy + boxH - m);
    ctx.lineTo(wx + r + m, wy + boxH - m);
    ctx.quadraticCurveTo(wx + m, wy + boxH - m, wx + m, wy + boxH - r - m);
    ctx.lineTo(wx + m, wy + r + m);
    ctx.quadraticCurveTo(wx + m, wy + m, wx + r + m, wy + m);
    ctx.closePath();
    ctx.strokeStyle = hsl((borderHue + 120) % 360, 70, 50, 0.12 * alphaBase);
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Shimmer line
  const shimmerY = wy + ((hlx.time * 30) % boxH);
  if (shimmerY > wy && shimmerY < wy + boxH) {
    const shim = ctx.createLinearGradient(wx, shimmerY - 1, wx, shimmerY + 1);
    shim.addColorStop(0, 'rgba(0,0,0,0)');
    shim.addColorStop(0.5, hsl((borderHue + 60) % 360, 100, 70, 0.1 * alphaBase));
    shim.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shim;
    ctx.fillRect(wx, shimmerY - 1, boxW, 2);
  }

  // Connecting dashed line
  ctx.beginPath();
  ctx.setLineDash([4, 6]);
  const connX1 = anchorX + (wx > anchorX ? hlx.radius + 8 : -hlx.radius - 8);
  const connX2 = wx > anchorX ? wx : wx + boxW;
  ctx.moveTo(connX1, anchorY);
  ctx.lineTo(connX2, anchorY);
  ctx.strokeStyle = hsl(borderHue, 80, 60, 0.25 * alphaBase);
  ctx.lineWidth = Math.max(0.5, s);
  ctx.stroke();
  ctx.setLineDash([]);

  // Code text
  ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const ly = wy + padY + i * lineH;
    const fadeIn = Math.min(1, line.age / 20);
    const cHue = (hlx.time * 50 + hlx.hueOffset + i * 30) % 360;

    // Codon
    ctx.font = `${fontSize}px Courier New`;
    ctx.fillStyle = hsl(cHue, 70, 55, 0.55 * fadeIn * alphaBase);
    ctx.fillText(`${line.codon}|${line.comp}`, wx + padX, ly);

    // Arrow
    const codonW = ctx.measureText(`${line.codon}|${line.comp}`).width;
    ctx.fillStyle = hsl(borderHue, 60, 50, 0.3 * fadeIn * alphaBase);
    ctx.fillText(' \u2192 ', wx + padX + codonW, ly);
    const arrowW = ctx.measureText(' \u2192 ').width;

    // Code
    const codeX = wx + padX + codonW + arrowW;
    const sn = line.snippet;
    if (sn.kw && s > 0.3) {
      ctx.font = `bold ${fontSize}px Courier New`;
      ctx.fillStyle = hsl((cHue + 180) % 360, 90, 65, 0.85 * fadeIn * alphaBase);
      ctx.fillText(sn.kw, codeX, ly);
      const kwW = ctx.measureText(sn.kw).width;
      ctx.font = `${fontSize}px Courier New`;
      ctx.fillStyle = hsl(cHue, 50, 70, 0.8 * fadeIn * alphaBase);
      ctx.fillText(sn.code.slice(sn.kw.length), codeX + kwW, ly);
    } else {
      ctx.font = `${fontSize}px Courier New`;
      ctx.fillStyle = hsl(cHue, 50, 70, 0.8 * fadeIn * alphaBase);
      ctx.fillText(sn.code, codeX, ly);
    }
  }

  ctx.restore();
}

function render() {
  // Fade with slight trail for holographic ghosting
  ctx.fillStyle = 'rgba(0, 0, 0, 0.16)';
  ctx.fillRect(0, 0, W, H);

  // Subtle background radiance
  const bgGrad = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, H * 0.9);
  bgGrad.addColorStop(0, 'rgba(0, 6, 18, 0.04)');
  bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0.06)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    p.alpha += (Math.random() - 0.5) * 0.012;
    p.alpha = Math.max(0.02, Math.min(0.18, p.alpha));
    const pH = (globalTime * 40 + p.x * 0.15) % 360;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = hsl(pH, 80, 60, p.alpha);
    ctx.fill();
  }

  // Update light
  light.x = W * 0.35 + Math.sin(globalTime * 0.012 * 0.5 / 0.012) * 150;
  light.y = H * 0.2 + Math.cos(globalTime * 0.012 * 0.3 / 0.012) * 100;

  // Draw helices back-to-front (deepest first)
  const sorted = [...helices].sort((a, b) => b.depth - a.depth);
  for (const hlx of sorted) {
    drawHelix(hlx);
  }

  globalTime += 1;
  requestAnimationFrame(render);
}

// Initialize scan positions
for (const hlx of helices) {
  hlx.scanY = H * hlx.cy;
}

ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
render();
</script>
</body>
</html>
