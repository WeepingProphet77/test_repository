<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Helix :: Holographic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="helix"></canvas>

<script>
const canvas = document.getElementById('helix');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// DNA bases and codon-to-code mapping
const BASES = ['A', 'T', 'G', 'C'];
const COMPLEMENTS = { A: 'T', T: 'A', G: 'C', C: 'G' };
const CODE_SNIPPETS = [
  { kw: 'function', code: 'function init()' },
  { kw: 'return', code: 'return sequence;' },
  { kw: 'let', code: 'let helix = []' },
  { kw: 'const', code: 'const BASES = 4' },
  { kw: '', code: '  genome.decode(strand)' },
  { kw: '', code: '  ribosomes.translate()' },
  { kw: 'if', code: 'if (codon.isStart())' },
  { kw: '', code: '  protein.fold(shape)' },
  { kw: 'for', code: 'for (base in chain)' },
  { kw: '', code: '  enzyme.splice(intron)' },
  { kw: '', code: '  nucleotide.bind(pair)' },
  { kw: 'class', code: 'class Chromosome {' },
  { kw: '', code: '  polymerase.copy(dna)' },
  { kw: '', code: '  helicase.unwind()' },
  { kw: 'async', code: 'async replicate(fork)' },
  { kw: '', code: '  promoter.activate(gene)' },
  { kw: '', code: '  membrane.transport()' },
  { kw: 'yield', code: 'yield aminoAcid' },
  { kw: '', code: '  ribosome.read(mRNA)' },
  { kw: '', code: '  telomere.extend(cap)' },
  { kw: '', code: '  histone.wrap(chromatin)' },
  { kw: 'export', code: 'export { genome }' },
  { kw: '', code: '  mutation.repair(base)' },
  { kw: '', code: '  centromere.attach()' },
  { kw: 'import', code: 'import { DNA } from "bio"' },
  { kw: 'while', code: 'while (replicating)' },
  { kw: '', code: '  strand.elongate(5, 3)' },
  { kw: 'switch', code: 'switch (nucleotide)' },
  { kw: '', code: '  case "A": pair("T")' },
  { kw: '', code: '  ligase.seal(fragment)' },
  { kw: 'new', code: 'new Ribosome(mRNA)' },
  { kw: '', code: '  codon.lookup(table)' },
];

// Generate DNA strand
const strandLength = 600;
const strand = [];
for (let i = 0; i < strandLength; i++) {
  strand.push(BASES[Math.floor(Math.random() * 4)]);
}

// Helix parameters
const helixRadius = 130;
const verticalSpacing = 14;
const rotationSpeed = 0.012;
const nucleotidesVisible = 42;
let time = 0;

// Scan line
let scanY = 0;
const scanSpeed = 0.35;
let scanDirection = 1;

// Particles
const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    size: Math.random() * 1.5 + 0.5,
    alpha: Math.random() * 0.25,
  });
}

// Code window state - 7 lines, constantly cycling
const codeWindowLines = 7;
let codeLines = [];
let codeScrollTimer = 0;
let codeScrollInterval = 12; // frames between new lines
let lastCodonIndex = -1;

function getNextCodeLine(baseIndex) {
  const ci = Math.floor(baseIndex / 3) * 3;
  const codon = strand[ci % strandLength]
    + strand[(ci + 1) % strandLength]
    + strand[(ci + 2) % strandLength];
  const comp = codon.split('').map(b => COMPLEMENTS[b]).join('');
  const snippet = CODE_SNIPPETS[ci % CODE_SNIPPETS.length];
  return { codon, comp, snippet, age: 0 };
}

// Holographic color cycling
function holoColor(baseAngle, depth, t) {
  const hue = (baseAngle * 30 + t * 40 + depth * 60) % 360;
  return hue;
}

function hslStr(h, s, l, a) {
  return `hsla(${h}, ${s}%, ${l}%, ${a})`;
}

// Light source
const light = { x: 0, y: 0 };

function drawHelixNode(x, y, z, base, baseAngle, isAtScan) {
  const depthScale = (z + 1) / 2;
  const size = 3.5 + depthScale * 4;

  const hue = holoColor(baseAngle, z, time);
  const dx = x - light.x;
  const dy = y - light.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const lightIntensity = Math.max(0, 1 - dist / 600) * depthScale;
  const specular = Math.pow(lightIntensity, 3);

  const baseLightness = 45 + specular * 40;
  const baseSat = 80 + specular * 20;

  // Holographic glow - rainbow shimmer
  if (depthScale > 0.35) {
    const glowSize = size * (isAtScan ? 5 : 3);
    const glow = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
    glow.addColorStop(0, hslStr(hue, 100, 70, isAtScan ? 0.25 : 0.1 * depthScale));
    glow.addColorStop(0.5, hslStr((hue + 40) % 360, 100, 50, isAtScan ? 0.1 : 0.04 * depthScale));
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x - glowSize, y - glowSize, glowSize * 2, glowSize * 2);
  }

  // Node with holographic gradient
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(x - size * 0.3, y - size * 0.3, 0, x, y, size);
  grad.addColorStop(0, hslStr(hue, baseSat, Math.min(95, baseLightness + 30), 0.9 * depthScale));
  grad.addColorStop(0.5, hslStr((hue + 20) % 360, baseSat, baseLightness, 0.7 * depthScale));
  grad.addColorStop(1, hslStr((hue + 50) % 360, 60, baseLightness * 0.4, 0.5 * depthScale));
  ctx.fillStyle = grad;
  ctx.fill();

  // Iridescent specular highlight
  if (specular > 0.08) {
    ctx.beginPath();
    ctx.arc(x - size * 0.2, y - size * 0.25, size * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = hslStr((hue + 180) % 360, 100, 90, specular * 0.7);
    ctx.fill();
  }

  // Scan flash
  if (isAtScan) {
    ctx.beginPath();
    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
    const flash = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
    flash.addColorStop(0, hslStr(hue, 100, 80, 0.4));
    flash.addColorStop(0.5, hslStr((hue + 60) % 360, 100, 60, 0.15));
    flash.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = flash;
    ctx.fill();
  }
}

function drawCodeWindow(anchorX, anchorY) {
  const lineH = 18;
  const padX = 14;
  const padY = 10;
  const boxW = 310;
  const boxH = padY * 2 + codeWindowLines * lineH + 4;

  // Position the floating window to the right of the helix
  let wx = anchorX + helixRadius + 50;
  let wy = anchorY - boxH / 2;

  // Keep on screen
  if (wx + boxW > W - 10) wx = anchorX - helixRadius - boxW - 50;
  if (wy < 10) wy = 10;
  if (wy + boxH > H - 10) wy = H - boxH - 10;

  // Holographic panel background
  ctx.save();

  // Outer glow
  const glowGrad = ctx.createRadialGradient(wx + boxW / 2, wy + boxH / 2, boxH * 0.3,
    wx + boxW / 2, wy + boxH / 2, boxH);
  glowGrad.addColorStop(0, `rgba(0, 255, 200, 0.04)`);
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(wx - 40, wy - 40, boxW + 80, boxH + 80);

  // Panel body - translucent holographic
  ctx.globalAlpha = 0.85;
  const panelGrad = ctx.createLinearGradient(wx, wy, wx + boxW, wy + boxH);
  panelGrad.addColorStop(0, 'rgba(0, 10, 20, 0.75)');
  panelGrad.addColorStop(0.5, 'rgba(0, 15, 30, 0.7)');
  panelGrad.addColorStop(1, 'rgba(5, 10, 25, 0.75)');
  ctx.fillStyle = panelGrad;

  // Rounded rect
  const r = 6;
  ctx.beginPath();
  ctx.moveTo(wx + r, wy);
  ctx.lineTo(wx + boxW - r, wy);
  ctx.quadraticCurveTo(wx + boxW, wy, wx + boxW, wy + r);
  ctx.lineTo(wx + boxW, wy + boxH - r);
  ctx.quadraticCurveTo(wx + boxW, wy + boxH, wx + boxW - r, wy + boxH);
  ctx.lineTo(wx + r, wy + boxH);
  ctx.quadraticCurveTo(wx, wy + boxH, wx, wy + boxH - r);
  ctx.lineTo(wx, wy + r);
  ctx.quadraticCurveTo(wx, wy, wx + r, wy);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Holographic border - shifting rainbow
  const borderHue = (time * 50) % 360;
  ctx.strokeStyle = hslStr(borderHue, 80, 55, 0.5);
  ctx.lineWidth = 1;
  ctx.stroke();

  // Second inner border for holographic depth
  ctx.beginPath();
  ctx.moveTo(wx + r + 2, wy + 2);
  ctx.lineTo(wx + boxW - r - 2, wy + 2);
  ctx.quadraticCurveTo(wx + boxW - 2, wy + 2, wx + boxW - 2, wy + r + 2);
  ctx.lineTo(wx + boxW - 2, wy + boxH - r - 2);
  ctx.quadraticCurveTo(wx + boxW - 2, wy + boxH - 2, wx + boxW - r - 2, wy + boxH - 2);
  ctx.lineTo(wx + r + 2, wy + boxH - 2);
  ctx.quadraticCurveTo(wx + 2, wy + boxH - 2, wx + 2, wy + boxH - r - 2);
  ctx.lineTo(wx + 2, wy + r + 2);
  ctx.quadraticCurveTo(wx + 2, wy + 2, wx + r + 2, wy + 2);
  ctx.closePath();
  ctx.strokeStyle = hslStr((borderHue + 120) % 360, 70, 50, 0.15);
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Scan line shimmer across the panel
  const shimmerY = wy + ((time * 30) % boxH);
  if (shimmerY > wy && shimmerY < wy + boxH) {
    const shimGrad = ctx.createLinearGradient(wx, shimmerY - 1, wx, shimmerY + 1);
    shimGrad.addColorStop(0, 'rgba(0,0,0,0)');
    shimGrad.addColorStop(0.5, hslStr((borderHue + 60) % 360, 100, 70, 0.12));
    shimGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shimGrad;
    ctx.fillRect(wx, shimmerY - 1, boxW, 2);
  }

  // Draw connecting line from scan point to window
  ctx.beginPath();
  ctx.setLineDash([4, 6]);
  const connStartX = anchorX + (wx > anchorX ? helixRadius + 10 : -helixRadius - 10);
  const connEndX = wx > anchorX ? wx : wx + boxW;
  ctx.moveTo(connStartX, anchorY);
  ctx.lineTo(connEndX, anchorY);
  ctx.strokeStyle = hslStr(borderHue, 80, 60, 0.3);
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  // Render code lines
  ctx.textBaseline = 'top';
  const visibleLines = codeLines.slice(-codeWindowLines);

  for (let i = 0; i < visibleLines.length; i++) {
    const line = visibleLines[i];
    const ly = wy + padY + i * lineH;
    const lineAge = line.age;
    const fadeIn = Math.min(1, lineAge / 20);

    // DNA codon part
    const codonHue = (time * 50 + i * 30) % 360;
    ctx.font = '11px Courier New';
    ctx.fillStyle = hslStr(codonHue, 70, 55, 0.6 * fadeIn);
    ctx.fillText(`${line.codon}|${line.comp}`, wx + padX, ly);

    // Arrow
    ctx.fillStyle = hslStr(borderHue, 60, 50, 0.3 * fadeIn);
    ctx.fillText(' \u2192 ', wx + padX + 60, ly);

    // Code part - keywords in different color
    const snippet = line.snippet;
    const codeX = wx + padX + 90;
    if (snippet.kw) {
      ctx.font = 'bold 11px Courier New';
      ctx.fillStyle = hslStr((codonHue + 180) % 360, 90, 65, 0.9 * fadeIn);
      ctx.fillText(snippet.kw, codeX, ly);
      const kwWidth = ctx.measureText(snippet.kw).width;
      ctx.font = '11px Courier New';
      ctx.fillStyle = hslStr(codonHue, 50, 70, 0.85 * fadeIn);
      ctx.fillText(snippet.code.slice(snippet.kw.length), codeX + kwWidth, ly);
    } else {
      ctx.font = '11px Courier New';
      ctx.fillStyle = hslStr(codonHue, 50, 70, 0.85 * fadeIn);
      ctx.fillText(snippet.code, codeX, ly);
    }
  }

  ctx.restore();
}

function render() {
  // Fade trail for holographic ghosting
  ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // Dark background with subtle color
  const bgGrad = ctx.createRadialGradient(W * 0.45, H * 0.5, 0, W * 0.45, H * 0.5, H);
  bgGrad.addColorStop(0, 'rgba(0, 8, 20, 0.06)');
  bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0.1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    p.alpha += (Math.random() - 0.5) * 0.015;
    p.alpha = Math.max(0.03, Math.min(0.2, p.alpha));
    const pH = (time * 40 + p.x * 0.2) % 360;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = hslStr(pH, 80, 60, p.alpha);
    ctx.fill();
  }

  const centerX = W / 2;
  const centerY = H / 2;
  const startY = centerY - (nucleotidesVisible / 2) * verticalSpacing;

  // Collect drawables for depth sorting
  const drawables = [];
  let scanBaseIndex = 0;

  for (let i = 0; i < nucleotidesVisible; i++) {
    const angle = time + i * 0.3;
    const y = startY + i * verticalSpacing;

    const x1 = centerX + Math.cos(angle) * helixRadius;
    const z1 = Math.sin(angle);
    const x2 = centerX + Math.cos(angle + Math.PI) * helixRadius;
    const z2 = Math.sin(angle + Math.PI);

    const base1 = strand[i % strandLength];
    const base2 = COMPLEMENTS[base1];
    const isAtScan = Math.abs(y - scanY) < 10;

    if (isAtScan) scanBaseIndex = i;

    drawables.push({ type: 'bond', x1, x2, y, z: (z1 + z2) / 2, angle, isAtScan });
    drawables.push({ type: 'node', x: x1, y, z: z1, base: base1, angle, isAtScan });
    drawables.push({ type: 'node', x: x2, y, z: z2, base: base2, angle: angle + Math.PI, isAtScan });
  }

  drawables.sort((a, b) => a.z - b.z);

  for (const d of drawables) {
    if (d.type === 'bond') {
      const depthScale = (d.z + 1) / 2;
      const alpha = 0.04 + depthScale * 0.12;
      const bondHue = holoColor(d.angle, d.z, time);

      ctx.beginPath();
      ctx.setLineDash([3, 4]);
      ctx.moveTo(d.x1, d.y);
      ctx.lineTo(d.x2, d.y);

      if (d.isAtScan) {
        ctx.strokeStyle = hslStr(bondHue, 100, 70, alpha * 4);
        ctx.lineWidth = 1.5;
        ctx.shadowColor = hslStr(bondHue, 100, 60, 0.4);
        ctx.shadowBlur = 10;
      } else {
        ctx.strokeStyle = hslStr(bondHue, 60, 50, alpha);
        ctx.lineWidth = 1;
        ctx.shadowBlur = 0;
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // Base pair labels
      if (depthScale > 0.4) {
        const mx = (d.x1 + d.x2) / 2;
        const bi = Math.round((d.y - startY) / verticalSpacing);
        const b1 = strand[bi % strandLength];
        const b2 = COMPLEMENTS[b1];
        ctx.font = `${8 + depthScale * 3}px Courier New`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const labelAlpha = d.isAtScan ? 0.9 : 0.12 + depthScale * 0.2;
        ctx.fillStyle = d.isAtScan
          ? hslStr(bondHue, 100, 80, labelAlpha)
          : hslStr(bondHue, 50, 60, labelAlpha);
        ctx.fillText(`${b1}\u2013${b2}`, mx, d.y);
        ctx.textAlign = 'left';
      }
    } else {
      drawHelixNode(d.x, d.y, d.z, d.base, d.angle, d.isAtScan);
    }
  }

  // Phosphate backbone with holographic colors
  for (let s = 0; s < 2; s++) {
    ctx.beginPath();
    for (let i = 0; i < nucleotidesVisible; i++) {
      const angle = time + i * 0.3 + s * Math.PI;
      const x = centerX + Math.cos(angle) * helixRadius;
      const y = startY + i * verticalSpacing;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const boneHue = (time * 30 + s * 180) % 360;
    ctx.strokeStyle = hslStr(boneHue, 70, 50, 0.06);
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Scan line
  const scanStartY = startY;
  const scanEndY = startY + nucleotidesVisible * verticalSpacing;
  scanY += scanSpeed * scanDirection;
  if (scanY > scanEndY + 20) scanDirection = -1;
  else if (scanY < scanStartY - 20) scanDirection = 1;

  // Draw holographic scan line on canvas
  const scanHue = (time * 60) % 360;
  const scanGrad = ctx.createLinearGradient(centerX - helixRadius - 60, 0, centerX + helixRadius + 60, 0);
  scanGrad.addColorStop(0, 'rgba(0,0,0,0)');
  scanGrad.addColorStop(0.2, hslStr(scanHue, 100, 65, 0.5));
  scanGrad.addColorStop(0.5, hslStr((scanHue + 40) % 360, 100, 80, 0.8));
  scanGrad.addColorStop(0.8, hslStr((scanHue + 80) % 360, 100, 65, 0.5));
  scanGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(centerX - helixRadius - 60, scanY - 1, helixRadius * 2 + 120, 2);

  // Scan line glow
  const scanGlow = ctx.createLinearGradient(0, scanY - 20, 0, scanY + 20);
  scanGlow.addColorStop(0, 'rgba(0,0,0,0)');
  scanGlow.addColorStop(0.5, hslStr(scanHue, 100, 60, 0.06));
  scanGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = scanGlow;
  ctx.fillRect(centerX - helixRadius - 60, scanY - 20, helixRadius * 2 + 120, 40);

  // Constantly cycle code lines
  codeScrollTimer++;
  if (codeScrollTimer >= codeScrollInterval) {
    codeScrollTimer = 0;
    const newLine = getNextCodeLine(scanBaseIndex + Math.floor(Math.random() * 12));
    codeLines.push(newLine);
    if (codeLines.length > codeWindowLines + 5) {
      codeLines = codeLines.slice(-codeWindowLines - 2);
    }
  }

  // Age all lines
  for (const line of codeLines) line.age++;

  // Draw floating code window at scan line position
  drawCodeWindow(centerX, scanY);

  // Update light
  light.x = W * 0.35 + Math.sin(time * 0.5) * 150;
  light.y = H * 0.2 + Math.cos(time * 0.3) * 100;

  time += rotationSpeed;
  requestAnimationFrame(render);
}

// Hide the HTML scan line elements (all done on canvas now)
document.getElementById('helix').style.position = 'fixed';
document.getElementById('helix').style.top = '0';
document.getElementById('helix').style.left = '0';

// Init
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
scanY = H * 0.5;

render();
</script>
</body>
</html>
